databases:
  - name: bloodbank-db-abhi
    databaseName: bloodbank_abhi
    user: bloodbank_user
    plan: free

services:
  - type: web
    name: bloodbank-management-abhi
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT BPProject.asgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bloodbank-db-abhi
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: BPProject.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
